    <script>
        function toggleDesc(btn) {
            var desc = btn.nextElementSibling;
            desc.style.display = (desc.style.display === "none" || desc.style.display === "") ? "block" : "none";
        }

        document.addEventListener('DOMContentLoaded', function() {
            const CF_WORKER_URL = '/capi-track';

            // دالة الإرسال المتطورة (جاهزة لاستقبال بيانات الفورمة وقاعدة البيانات)
            function sendToCAPI(eventName, extraData = {}) {
                try {
                    const payload = { 
                        eventName: eventName, 
                        url: window.location.href,
                        ...extraData 
                    };
                    fetch(CF_WORKER_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    }).catch(e => console.log('CAPI Silent Error')); 
                } catch(e) {}
            }

            sendToCAPI('PageView_Okaz_Retail');

            function setupTracking(elementId, eventName) {
                var btn = document.getElementById(elementId);
                if(btn) {
                    btn.addEventListener('click', function() {
                        if (typeof fbq === 'function') { fbq('trackCustom', eventName); }
                        if (typeof gtag === 'function') { gtag('event', eventName); }
                        sendToCAPI(eventName);
                    });
                }
            }

            setupTracking('btn-nav-call', 'Retail_Call_Top');
            setupTracking('btn-main-catalog', 'View_Catalog_Okaz');
            setupTracking('btn-retail-shoum', 'Retail_WA_Shoum');
            setupTracking('btn-retail-kharzan', 'Retail_WA_Kharzan');
            setupTracking('btn-fb-okaz', 'Social_Facebook_Okaz');
            setupTracking('btn-complaint-okaz', 'Complaint_WA_Okaz');
            setupTracking('float-call-okaz', 'Floating_Call_Okaz');
            setupTracking('float-messenger-okaz', 'Floating_Messenger_Okaz');
            setupTracking('float-wa-okaz', 'Floating_WA_Okaz');
        });
    </script>
