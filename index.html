    <style>

        :root { 
            --cyan: #00f2ff;

            --card-bg: rgba(13, 17, 33, 0.7);
            --glass-border: rgba(0, 242, 255, 0.15);

            --emerald: #10b981;

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Cairo', sans-serif; 
            background-color: var(--dark-bg); 
            color: var(--text-main); 
            overflow-x: hidden; 
            line-height: 1.6;
            background-image:

            box-shadow: 0 4px 30px rgba(0,0,0,0.5);
        }
        .logo { font-size: 2rem; font-weight: 800; color: var(--text-main); letter-spacing: 2px; display: flex; align-items: center; gap: 8px;}

        .nav-links { list-style: none; display: flex; gap: 30px; font-weight: 600; }

        .contact-btn-nav {

            padding: 8px 20px; border-radius: 30px; font-weight: 700; color: #fff;
            box-shadow: 0 4px 15px rgba(0, 85, 255, 0.3);
        }
        .contact-btn-nav:hover { box-shadow: 0 4px 25px rgba(0, 242, 255, 0.6); transform: translateY(-2px); }

        /* ================== قسم الـ Hero ================== */
        .hero { 
            min-height: 100vh; display: flex; align-items: center; justify-content: center; 
            text-align: center; position: relative; padding: 100px 20px 20px;

        }
        .hero::before {

            background: linear-gradient(to bottom, transparent, var(--dark-bg)); z-index: 1;
        }
        .hero-content { z-index: 2; max-width: 800px; }
        .badge-tech {

            font-weight: 700; margin-bottom: 20px; letter-spacing: 1px;
        }
        .hero-title { font-size: clamp(2.5rem, 5vw, 4.5rem); font-weight: 900; margin-bottom: 20px; line-height: 1.2; }
        .hero-title span { 
            background: linear-gradient(90deg, var(--cyan), var(--blue)); 
            -webkit-background-clip: text; color: transparent; 
        }
        .hero-text { font-size: 1.2rem; color: var(--text-muted); margin-bottom: 40px; }
        
        .btn-glow {
            position: relative; display: inline-flex; align-items: center; gap: 10px;
            padding: 15px 40px; border-radius: 8px; font-size: 1.1rem; font-weight: 800;
            background: var(--dark-bg); color: var(--cyan); border: 2px solid var(--cyan);
            overflow: hidden; z-index: 1; transition: 0.4s;
        }
        .btn-glow::before {
            content: ''; position: absolute; top: 0; left: 0; width: 0%; height: 100%;
            background: var(--cyan); z-index: -1; transition: 0.4s ease-in-out;
        }
        .btn-glow:hover::before { width: 100%; }
        .btn-glow:hover { color: var(--dark-bg); box-shadow: 0 0 20px rgba(0,242,255,0.6); }

        .stats-container {

            position: relative; z-index: 5;
